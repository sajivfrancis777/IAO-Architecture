# system_master.yaml — Single source of truth for DB platforms, tech platforms,
# and system defaults.
#
# Consumed by:
#   - scripts/enrich_flows.py          (enrichment fallback)
#   - src/mermaid_builder.py           (diagram node inference)
#   - scripts/generate_system_registry.py  (Input Portal dropdowns)
#   - scripts/generate_simple_template.py  (Excel template dropdowns)
#
# Adding a new entry here automatically propagates to all consumers.
# ---------------------------------------------------------------------------

# ── Approved database platforms ──────────────────────────────────────────────
# These appear as locked dropdown options in the Input Portal and Excel template.
databases:
  - id: SAP_HANA
    label: "SAP HANA"
    category: in-memory
  - id: SAP_HANA_CLOUD
    label: "SAP HANA Cloud"
    category: cloud
  - id: ORACLE
    label: "Oracle DB"
    category: relational
  - id: MSSQL
    label: "SQL Server"
    category: relational
  - id: POSTGRESQL
    label: "PostgreSQL"
    category: relational
  - id: MYSQL
    label: "MySQL"
    category: relational
  - id: DB2
    label: "DB2"
    category: relational
  - id: SNOWFLAKE
    label: "Snowflake"
    category: cloud-dw
  - id: DELTA_LAKE
    label: "Delta Lake"
    category: cloud-dw
  - id: AZURE_DATA_LAKE
    label: "Azure Data Lake"
    category: cloud
  - id: AZURE_SQL
    label: "Azure SQL"
    category: cloud
  - id: TERADATA
    label: "Teradata"
    category: relational
  - id: MONGODB
    label: "MongoDB"
    category: nosql
  - id: OTHER
    label: "Other"
    category: other

# ── Approved technology platforms ────────────────────────────────────────────
platforms:
  - id: SAP_HEC
    label: "SAP HEC (On-Prem)"
    category: on-prem
  - id: SAP_BTP
    label: "SAP BTP (Cloud)"
    category: cloud
  - id: SAP_CLOUD_SAAS
    label: "SAP Cloud (SaaS)"
    category: saas
  - id: SAP_ON_PREM_LINUX
    label: "SAP On-Prem (Linux)"
    category: on-prem
  - id: AZURE_CLOUD
    label: "Azure (Cloud)"
    category: cloud
  - id: AWS_CLOUD
    label: "AWS (Cloud)"
    category: cloud
  - id: GCP_CLOUD
    label: "Google Cloud (SaaS)"
    category: cloud
  - id: ON_PREM_LINUX
    label: "On-Prem (Linux)"
    category: on-prem
  - id: ON_PREM_WINDOWS
    label: "On-Prem (Windows)"
    category: on-prem
  - id: MULESOFT_ANYPOINT
    label: "MuleSoft Anypoint (Cloud)"
    category: middleware
  - id: KUBERNETES
    label: "Kubernetes"
    category: cloud
  - id: OTHER
    label: "Other"
    category: other

