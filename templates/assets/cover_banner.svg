<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071c5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00aeef;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)" rx="8"/>
  <rect width="800" height="480" fill="url(#grid)" rx="8"/>
  <rect width="800" height="480" fill="url(#accent)" rx="8"/>

  <!-- Decorative circuit/architecture lines -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="1.5" fill="none">
    <path d="M 0 100 L 120 100 L 160 140 L 280 140"/>
    <path d="M 0 260 L 80 260 L 120 220 L 200 220 L 240 260 L 360 260"/>
    <path d="M 520 100 L 600 100 L 640 60 L 800 60"/>
    <path d="M 440 340 L 560 340 L 600 300 L 720 300 L 760 340 L 800 340"/>
    <path d="M 600 400 L 680 400 L 720 440"/>
    <path d="M 0 400 L 40 400 L 80 360"/>
    <path d="M 200 420 L 320 420 L 360 380 L 480 380"/>
    <path d="M 650 440 L 750 440 L 800 480"/>
  </g>

  <!-- Decorative nodes -->
  <g fill="rgba(255,255,255,0.18)">
    <circle cx="120" cy="100" r="4"/>
    <circle cx="280" cy="140" r="4"/>
    <circle cx="200" cy="220" r="4"/>
    <circle cx="360" cy="260" r="4"/>
    <circle cx="600" cy="100" r="4"/>
    <circle cx="720" cy="300" r="4"/>
    <circle cx="560" cy="340" r="4"/>
    <circle cx="80" cy="360" r="4"/>
    <circle cx="480" cy="380" r="4"/>
    <circle cx="320" cy="420" r="4"/>
  </g>

  <!-- TOGAF BDAT boxes -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">
    <!-- B -->
    <rect x="150" y="140" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="210" y="165" text-anchor="middle" fill="#fff">Business</text>
    <!-- D -->
    <rect x="290" y="140" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="350" y="165" text-anchor="middle" fill="#fff">Data</text>
    <!-- A -->
    <rect x="430" y="140" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="490" y="165" text-anchor="middle" fill="#fff">Application</text>
    <!-- T -->
    <rect x="570" y="140" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="630" y="165" text-anchor="middle" fill="#fff">Technology</text>
  </g>

  <!-- Connecting lines between BDAT boxes -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="1">
    <line x1="270" y1="160" x2="290" y2="160"/>
    <line x1="410" y1="160" x2="430" y2="160"/>
    <line x1="550" y1="160" x2="570" y2="160"/>
  </g>

  <!-- Main title -->
  <text x="400" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">
    IAO Architecture
  </text>
  <text x="400" y="300" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.8)" letter-spacing="2">
    TOGAF BDAT · IAO Program · IDM 2.0
  </text>

  <!-- Bottom accent bar -->
  <rect x="280" y="340" width="240" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>

  <!-- Intel text -->
  <text x="400" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="3">
    INTEL CONFIDENTIAL
  </text>
</svg>
