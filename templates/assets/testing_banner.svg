<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a40e26;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d1242f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)" rx="8"/>
  <rect width="800" height="480" fill="url(#grid)" rx="8"/>
  <rect width="800" height="480" fill="url(#accent)" rx="8"/>

  <!-- Decorative circuit/architecture lines -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="1.5" fill="none">
    <path d="M 0 100 L 120 100 L 160 140 L 280 140"/>
    <path d="M 0 260 L 80 260 L 120 220 L 200 220 L 240 260 L 360 260"/>
    <path d="M 520 100 L 600 100 L 640 60 L 800 60"/>
    <path d="M 440 340 L 560 340 L 600 300 L 720 300 L 760 340 L 800 340"/>
    <path d="M 600 400 L 680 400 L 720 440"/>
    <path d="M 0 400 L 40 400 L 80 360"/>
    <path d="M 200 420 L 320 420 L 360 380 L 480 380"/>
    <path d="M 650 440 L 750 440 L 800 480"/>
  </g>

  <!-- Decorative nodes -->
  <g fill="rgba(255,255,255,0.18)">
    <circle cx="120" cy="100" r="4"/>
    <circle cx="280" cy="140" r="4"/>
    <circle cx="200" cy="220" r="4"/>
    <circle cx="360" cy="260" r="4"/>
    <circle cx="600" cy="100" r="4"/>
    <circle cx="720" cy="300" r="4"/>
    <circle cx="560" cy="340" r="4"/>
    <circle cx="80" cy="360" r="4"/>
    <circle cx="480" cy="380" r="4"/>
    <circle cx="320" cy="420" r="4"/>
  </g>

  <!-- Test phase boxes -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">
    <!-- TDD -->
    <rect x="120" y="130" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="180" y="155" text-anchor="middle" fill="#fff">TDD Build</text>
    <!-- FUT -->
    <rect x="260" y="130" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="320" y="155" text-anchor="middle" fill="#fff">FUT Testing</text>
    <!-- SIT -->
    <rect x="400" y="130" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="460" y="155" text-anchor="middle" fill="#fff">SIT Testing</text>
    <!-- UAT -->
    <rect x="540" y="130" width="120" height="40" rx="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="600" y="155" text-anchor="middle" fill="#fff">UAT Testing</text>
  </g>

  <!-- Connecting arrows between test phases -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="rgba(255,255,255,0.3)">
    <line x1="240" y1="150" x2="255" y2="150"/>
    <polygon points="255,146 260,150 255,154"/>
    <line x1="380" y1="150" x2="395" y2="150"/>
    <polygon points="395,146 400,150 395,154"/>
    <line x1="520" y1="150" x2="535" y2="150"/>
    <polygon points="535,146 540,150 535,154"/>
  </g>

  <!-- Main title -->
  <text x="400" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">
    Testing &amp; Quality Report
  </text>
  <text x="400" y="285" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.8)" letter-spacing="2">
    Defects · Test Execution · By Tower · By Capability
  </text>

  <!-- Bottom accent bar -->
  <rect x="280" y="320" width="240" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>

  <!-- Subtitle -->
  <text x="400" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" letter-spacing="1">
    IAO Program · IDM 2.0 · SAP S/4HANA Transformation
  </text>

  <!-- Intel text -->
  <text x="400" y="400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="3">
    INTEL CONFIDENTIAL
  </text>
</svg>
