# Deploy generated HTML architecture docs to GitHub Pages
# Enables direct browser viewing of HTML outputs without htmlpreview workaround

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Generate Architecture Docs"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Custom domain for GitHub Pages (optional)
  # Set to your corporate subdomain, e.g. iao-architecture.intel.com
  # Leave empty to use the default github.io URL
  CUSTOM_DOMAIN: ''

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install jinja2 pyyaml markdown openpyxl

      - name: Regenerate SADs (all releases)
        run: |
          echo "Regenerating SAD Markdown + HTML for all towers (all releases)..."
          python -m src.gen_systems_arch --all
          echo "SAD MD generation complete"
          find towers -name "*-Architecture.md" | wc -l | xargs -I{} echo "  Total SAD MD files: {}"

      - name: Generate RICEFW Trackers (all releases)
        run: |
          echo "Generating RICEFW Tracker docs for all towers (all releases)..."
          python scripts/gen_ricefw_tracker.py --all
          find towers -name "*-RICEFW-Tracker.*" | wc -l | xargs -I{} echo "  Total RICEFW docs: {}"

      - name: Generate Testing Reports (all releases)
        run: |
          echo "Generating Testing Reports for all towers (all releases)..."
          python scripts/gen_testing_report.py --all
          find towers -name "*-Testing-Report.*" | wc -l | xargs -I{} echo "  Total Testing docs: {}"

      - name: Generate Summary Documents (L0/L1/Program)
        run: |
          echo "Generating L0/L1/Program architecture summaries..."
          python -m src.gen_summary --all
          find towers -name "*-Summary.md" | wc -l | xargs -I{} echo "  Tower summaries: {}"
          ls output/docs/summaries/*.md 2>/dev/null | wc -l | xargs -I{} echo "  Program summaries: {}"

      - name: Convert all MD docs to HTML (all releases)
        run: |
          echo "Converting all MD docs (Architecture + RICEFW + Testing) to HTML..."
          python scripts/gen_pdf.py --html-only
          find towers -name "*-RICEFW-Tracker.html" | wc -l | xargs -I{} echo "  RICEFW HTML files: {}"
          find towers -name "*-Testing-Report.html" | wc -l | xargs -I{} echo "  Testing HTML files: {}"

      - name: Snapshot all-releases output
        run: |
          echo "Saving all-releases output as baseline..."
          mkdir -p /tmp/all-releases
          find towers -name "*.html" -o -name "*.md" | while read f; do
            dest="/tmp/all-releases/$f"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done
          # Also snapshot Program-level summaries
          if [ -d "output/docs/summaries" ]; then
            mkdir -p /tmp/all-releases/output/docs/summaries
            cp output/docs/summaries/*.md /tmp/all-releases/output/docs/summaries/ 2>/dev/null || true
            cp output/docs/summaries/*.html /tmp/all-releases/output/docs/summaries/ 2>/dev/null || true
          fi
          find /tmp/all-releases -name "*.html" | wc -l | xargs -I{} echo "  Snapshot: {} HTML files"

      - name: Generate per-release documents
        run: |
          # For each release with data, regenerate with --release filter
          # Output overwrites towers/ files, which we then copy to _site/Rx/
          RELEASES="R1 R2 R3 R4 R5"
          for REL in $RELEASES; do
            echo ""
            echo "=========================================="
            echo "Generating documents for release: $REL"
            echo "=========================================="

            # Restore all-releases baseline before each release run
            rsync -a /tmp/all-releases/towers/ towers/
            if [ -d "/tmp/all-releases/output" ]; then
              rsync -a /tmp/all-releases/output/ output/
            fi

            # Purge ALL generated docs so that only freshly-regenerated files
            # for THIS release survive.  Without this, files from a previous
            # release iteration (or the all-releases baseline) persist when a
            # generator skips a capability (no data for this release) and get
            # copied into /tmp/release-Rx/ with stale content.
            find towers -type f \( -name "*-Architecture.md" -o -name "*-Architecture.html" \
                 -o -name "*-RICEFW-Tracker.md" -o -name "*-RICEFW-Tracker.html" \
                 -o -name "*-Testing-Report.md" -o -name "*-Testing-Report.html" \
                 -o -name "*-Summary.md" -o -name "*-Summary.html" \) -delete
            rm -rf output/docs/summaries/*

            # Regenerate with release filter
            python -m src.gen_systems_arch --all --release "$REL"
            python scripts/gen_ricefw_tracker.py --all --release "$REL"
            python scripts/gen_testing_report.py --all --release "$REL"
            python -m src.gen_summary --all --release "$REL"
            python scripts/gen_pdf.py --html-only

            # Verify release label was applied to a sample file
            SAMPLE=$(find towers -name "*-Architecture.md" | head -1)
            if [ -n "$SAMPLE" ]; then
              if grep -q "IAO Program · ${REL}" "$SAMPLE"; then
                echo "  ✅ Verified: $SAMPLE contains release label $REL"
              else
                echo "  ⚠️ WARNING: $SAMPLE does NOT contain release label $REL"
                head -10 "$SAMPLE"
              fi
            fi

            # Copy release-specific outputs to staging area
            mkdir -p "/tmp/release-${REL}"
            find towers -name "*.html" | while read f; do
              dest="/tmp/release-${REL}/$f"
              mkdir -p "$(dirname "$dest")"
              cp "$f" "$dest"
            done
            # Also stage per-release Program summary
            if [ -d "output/docs/summaries" ]; then
              mkdir -p "/tmp/release-${REL}/output/docs/summaries"
              find output/docs/summaries -name "*.html" -exec cp {} "/tmp/release-${REL}/output/docs/summaries/" \;
            fi
            echo "  $REL: $(find /tmp/release-${REL} -name '*.html' | wc -l) HTML files"
          done

          # Restore all-releases baseline for the default site
          rsync -a /tmp/all-releases/towers/ towers/
          if [ -d "/tmp/all-releases/output" ]; then
            rsync -a /tmp/all-releases/output/ output/
          fi

      - name: Generate dashboards
        run: |
          python scripts/gen_dashboard.py
          echo "Dashboard generation complete"
          ls -la output/docs/dashboard/ || true
          ls -la towers/*/output/docs/dashboard/ || true

      - name: Create Pages structure
        run: |
          mkdir -p _site

          # Disable Jekyll processing (breaks dirs starting with _)
          touch _site/.nojekyll

          # Custom 404 page
          cp 404.html _site/404.html

          # Copy all HTML and SVG outputs from towers, replacing spaces
          # with hyphens in directory names to avoid URL-encoding issues
          find towers -name "*.html" -o -name "*.svg" | while read f; do
            dest="_site/$(echo "$f" | sed 's/ /-/g')"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done

          # Copy per-release HTML outputs into _site/R1/, _site/R2/, ..., _site/R5/
          RELEASES="R1 R2 R3 R4 R5"
          for REL in $RELEASES; do
            if [ -d "/tmp/release-${REL}" ]; then
              echo "Copying release ${REL} outputs to _site/${REL}/..."
              find "/tmp/release-${REL}/towers" -name "*.html" -o -name "*.svg" | while read f; do
                rel_path="${f#/tmp/release-${REL}/}"
                dest="_site/${REL}/$(echo "${rel_path}" | sed 's/ /-/g')"
                mkdir -p "$(dirname "$dest")"
                cp "$f" "$dest"
              done
              # Copy shared assets into release subfolder
              mkdir -p "_site/${REL}/templates/assets"
              cp templates/assets/cover_banner.svg "_site/${REL}/templates/assets/"
              cp templates/assets/ricefw_banner.svg "_site/${REL}/templates/assets/"
              cp templates/assets/testing_banner.svg "_site/${REL}/templates/assets/"
              [ -f favicon.ico ] && cp favicon.ico "_site/${REL}/favicon.ico"
              # Copy per-release Program summaries
              if [ -d "/tmp/release-${REL}/output/docs/summaries" ]; then
                mkdir -p "_site/${REL}/summaries"
                find "/tmp/release-${REL}/output/docs/summaries" -name "*.html" -exec cp {} "_site/${REL}/summaries/" \;
                # Fix banner path for Program summaries (deployed 1 level deep under /Rx/summaries/)
                find "_site/${REL}/summaries" -name "*.html" -exec sed -i 's|\.\./\.\./\.\./templates/assets/|../templates/assets/|g' {} \;
              fi
              echo "  ${REL}: $(find _site/${REL} -name '*.html' | wc -l) HTML files deployed"
            fi
          done

          # Copy banner assets so relative paths from HTML files resolve
          mkdir -p _site/templates/assets
          cp templates/assets/cover_banner.svg _site/templates/assets/
          cp templates/assets/ricefw_banner.svg _site/templates/assets/
          cp templates/assets/testing_banner.svg _site/templates/assets/

          # Copy favicon to site root
          [ -f favicon.ico ] && cp favicon.ico _site/favicon.ico

          # Copy generated dashboards into _site
          if [ -f "output/docs/dashboard/Program-Dashboard.html" ]; then
            mkdir -p _site/dashboard
            cp output/docs/dashboard/Program-Dashboard.html _site/dashboard/index.html
          fi

          # Copy Program-level summary into _site
          if [ -d "output/docs/summaries" ]; then
            mkdir -p _site/summaries
            find output/docs/summaries -name "*.html" | while read f; do
              cp "$f" "_site/summaries/$(basename "$f")"
            done
            # Fix banner path for Program summaries (deployed 1 level deep under /summaries/)
            find _site/summaries -name "*.html" -exec sed -i 's|\.\./\.\./\.\./templates/assets/|../templates/assets/|g' {} \;
            echo "  Program summaries: $(find _site/summaries -name '*.html' 2>/dev/null | wc -l) files"
          fi

          for tower_dir in towers/*/; do
            tower=$(basename "$tower_dir")
            dash_file="${tower_dir}output/docs/dashboard/${tower}-Dashboard.html"
            if [ -f "$dash_file" ]; then
              mkdir -p "_site/dashboard/${tower}"
              cp "$dash_file" "_site/dashboard/${tower}/index.html"
            fi
          done

          # ── Tower metadata from centralized registry ────────────────
          # Reads config/tower_registry.json instead of hardcoded case statements.
          # This means adding a new tower only requires updating the JSON file.
          tower_desc() {
            local sc="$1"
            local reg="config/tower_registry.json"
            if [ -f "$reg" ]; then
              local name desc icon
              name=$(python3 -c "import json; d=json.load(open('$reg')); print(d['towers'].get('$sc',{}).get('name','$sc'))" 2>/dev/null || echo "$sc")
              desc=$(python3 -c "import json; d=json.load(open('$reg')); print(d['towers'].get('$sc',{}).get('description','Architecture documents'))" 2>/dev/null || echo "Architecture documents")
              icon=$(python3 -c "import json; d=json.load(open('$reg')); print(d['towers'].get('$sc',{}).get('icon','📄'))" 2>/dev/null || echo "📄")
              echo "${name}|${desc}|${icon}"
            else
              echo "$sc|Architecture documents|📄"
            fi
          }

          # ── Build navigation manifest (nav.json) ──────────────────
          echo '[' > _site/nav.json
          first_tower=true
          is_first_tower=true
          for tower_dir in towers/*/; do
            tower=$(basename "$tower_dir")
            info=$(tower_desc "$tower")
            full_name=$(echo "$info" | cut -d'|' -f1)
            icon=$(echo "$info" | cut -d'|' -f3)

            $first_tower || echo ',' >> _site/nav.json
            first_tower=false

            # L0 summary link for this tower
            l0_file="towers/${tower}/output/docs/summaries/L0-${tower}-Summary.html"
            l0_href=""
            [ -f "_site/${l0_file}" ] && l0_href="${l0_file}"

            # Program Summary link — attach to the first tower entry only
            prog_extra=""
            if $is_first_tower; then
              prog_file="_site/summaries/Program-Summary.html"
              if [ -f "$prog_file" ]; then
                prog_extra=",\"_program_summary\":\"summaries/Program-Summary.html\""
              fi
              is_first_tower=false
            fi

            echo "{\"tower\":\"${tower}\",\"name\":\"${full_name}\",\"icon\":\"${icon}\",\"l0_summary\":\"${l0_href}\"${prog_extra},\"groups\":[" >> _site/nav.json

            first_group=true
            for proc_dir in "$tower_dir"*/; do
              [ -d "$proc_dir" ] || continue
              proc_name=$(basename "$proc_dir")
              html_files=$(find "$proc_dir" -name "*-Architecture.html" -type f | sort)
              [ -z "$html_files" ] && continue

              $first_group || echo ',' >> _site/nav.json
              first_group=false

              # L1 summary link for this process group
              l1_slug=$(echo "$proc_name" | sed 's/[^a-zA-Z0-9 ]//g' | sed 's/  */ /g' | sed 's/ /-/g' | cut -c1-40)
              l1_file="towers/${tower}/output/docs/summaries/L1-${l1_slug}-Summary.html"
              l1_href=""
              [ -f "_site/${l1_file}" ] && l1_href="${l1_file}"

              echo "{\"group\":\"${proc_name}\",\"l1_summary\":\"${l1_href}\",\"caps\":[" >> _site/nav.json

              first_cap=true
              echo "$html_files" | while read html; do
                cap=$(basename "$html" | sed 's/-Architecture.html//')
                # Extract the real capability title from the generated HTML <h1> tag
                cap_title=$(grep -oP '<h1 style="font-size:36px[^>]*>\K[^<]+' "$html" 2>/dev/null | head -1)
                # Strip the "DS-020 — " prefix to get just the name
                cap_name=$(echo "$cap_title" | sed "s/^${cap} — //")
                [ -z "$cap_name" ] && cap_name="$cap"
                $first_cap || printf ',' >> _site/nav.json
                first_cap=false
                echo "{\"id\":\"${cap}\",\"name\":\"${cap_name}\",\"href\":\"cap/${tower}-${cap}.html\"}" >> _site/nav.json
              done
              echo ']}'  >> _site/nav.json
            done
            echo ']}'  >> _site/nav.json
          done
          echo ']' >> _site/nav.json

          # Copy nav.json into release subfolders so sidebar works in all release docs
          RELEASES="R1 R2 R3 R4 R5"
          for REL in $RELEASES; do
            if [ -d "_site/${REL}" ]; then
              cp _site/nav.json "_site/${REL}/nav.json"
            fi
          done

          # ── SHARED CSS ─────────────────────────────────────────────
          SHARED_CSS='
          *,*::before,*::after{box-sizing:border-box}
          body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e}
          .topbar{background:linear-gradient(135deg,#00285a 0%,#0071c5 100%);padding:0 32px;display:flex;align-items:center;height:56px;box-shadow:0 2px 8px rgba(0,0,0,.15);position:fixed;top:0;left:0;right:0;z-index:100}
          .topbar img{height:28px;width:28px;object-fit:contain;margin-right:12px;border-radius:4px}
          .topbar h1{color:#fff;font-size:18px;font-weight:600;margin:0;letter-spacing:.5px}
          .topbar a.back-link{color:rgba(255,255,255,.85);text-decoration:none;font-size:14px;margin-left:auto}
          .topbar a.back-link:hover{color:#fff}
          .topbar .sidebar-toggle{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;margin-right:12px;padding:4px 8px}

          /* ── Sidebar ── */
          .sidebar{position:fixed;top:56px;left:0;bottom:0;width:280px;background:#fff;border-right:1px solid #e4e8ed;overflow-y:auto;z-index:90;transition:transform .25s ease;padding-bottom:24px}
          .sidebar .search-box{padding:12px 16px;border-bottom:1px solid #e4e8ed;position:sticky;top:0;background:#fff;z-index:1}
          .sidebar .search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid #d0d5dd;border-radius:8px;font-size:13px;outline:none;background:#f8f9fb url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2716%27 height=%2716%27 fill=%27%23999%27 viewBox=%270 0 16 16%27%3E%3Cpath d=%27M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z%27/%3E%3C/svg%3E") 10px center no-repeat}
          .sidebar .search-box input:focus{border-color:#0071c5;box-shadow:0 0 0 2px rgba(0,113,197,.15)}
          .sidebar .nav-tree{padding:8px 0}
          .sidebar .tower-group{margin-bottom:2px}
          .sidebar .tower-header{display:flex;align-items:center;padding:8px 16px;font-size:14px;font-weight:600;color:#00285a;cursor:pointer;user-select:none;border-radius:0}
          .sidebar .tower-header:hover{background:#f5f8fc}
          .sidebar .tower-header .arrow{font-size:10px;margin-right:8px;transition:transform .2s;color:#999}
          .sidebar .tower-header.open .arrow{transform:rotate(90deg)}
          .sidebar .tower-header .icon{margin-right:6px}
          .sidebar .tower-header a{color:inherit;text-decoration:none;flex:1}
          .sidebar .proc-group{margin-left:16px;display:none}
          .sidebar .tower-header.open+.proc-group,.sidebar .proc-group.search-open{display:block}
          .sidebar .proc-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:8px 16px 4px;margin-top:4px;cursor:pointer;user-select:none}
          .sidebar .proc-label:hover{color:#00285a}
          .sidebar .proc-label .l1-arrow{font-size:9px;margin-right:4px;display:inline-block;transition:transform .2s;color:#aaa}
          .sidebar .proc-label.open .l1-arrow{transform:rotate(90deg)}
          .sidebar .l1-children{display:none;margin-left:8px}
          .sidebar .proc-label.open+.l1-children{display:block}
          .sidebar .cap-link{display:block;padding:4px 16px 4px 24px;font-size:13px;color:#444;text-decoration:none;border-radius:4px;margin:1px 8px}
          .sidebar .cap-link:hover{background:#e8f4fd;color:#0071c5}
          .sidebar .cap-link.active{background:#0071c5;color:#fff;font-weight:600}
          .sidebar .cap-id{font-weight:600;color:#00285a;margin-right:4px}
          .sidebar .cap-link.active .cap-id{color:#fff}
          .sidebar .no-results{padding:16px;font-size:13px;color:#999;text-align:center;font-style:italic}

          /* ── Layout ── */
          .page-body{margin-top:56px;margin-left:280px;transition:margin-left .25s ease}
          .container{max-width:1120px;margin:0 auto;padding:24px 24px 48px}
          .breadcrumb{font-size:13px;color:#666;margin-bottom:20px}
          .breadcrumb a{color:#0071c5;text-decoration:none}
          .breadcrumb a:hover{text-decoration:underline}
          .hero{background:linear-gradient(135deg,#00285a,#0060a9);color:#fff;border-radius:12px;padding:48px 40px;margin-bottom:32px;position:relative;overflow:hidden}
          .hero::after{content:"";position:absolute;top:0;right:0;width:300px;height:100%;background:url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 300 200%27%3E%3Cpath d=%27M0 100L80 100L120 60L200 60L240 100L300 100%27 stroke=%27rgba(255,255,255,.08)%27 fill=%27none%27 stroke-width=%272%27/%3E%3Cpath d=%27M0 140L60 140L100 180L180 180L220 140L300 140%27 stroke=%27rgba(255,255,255,.06)%27 fill=%27none%27 stroke-width=%272%27/%3E%3C/svg%3E") no-repeat center;opacity:.5;pointer-events:none}
          .hero h2{font-size:32px;margin:0 0 8px;font-weight:700;position:relative}
          .hero p{font-size:16px;opacity:.85;margin:0;position:relative}
          .hero .badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 14px;font-size:12px;margin-top:12px;position:relative}
          .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}
          .card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e4e8ed;transition:all .2s;text-decoration:none;color:inherit;display:block}
          .card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:#0071c5}
          .card h3{margin:0 0 8px;font-size:18px;color:#00285a}
          .card .meta{font-size:13px;color:#666;margin-bottom:12px}
          .card .count{display:inline-block;background:#e8f4fd;color:#0060a9;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600}
          .card .arrow{float:right;color:#0071c5;font-size:20px;margin-top:-24px}
          .section-title{font-size:20px;font-weight:700;color:#00285a;margin:32px 0 16px;padding-bottom:8px;border-bottom:2px solid #e4e8ed}
          table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e4e8ed}
          th{background:#00285a;color:#fff;padding:12px 16px;font-size:13px;font-weight:600;text-align:left;text-transform:uppercase;letter-spacing:.5px}
          td{padding:10px 16px;border-bottom:1px solid #f0f2f5;font-size:14px}
          tr:last-child td{border-bottom:none}
          tr:hover td{background:#f5f8fc}
          td a{color:#0071c5;text-decoration:none;font-weight:500}
          td a:hover{text-decoration:underline}
          .footer{text-align:center;padding:32px 0;font-size:12px;color:#999;border-top:1px solid #e4e8ed;margin-top:48px}

          /* ── Mobile ── */
          @media(max-width:768px){
            .topbar .sidebar-toggle{display:block}
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0);box-shadow:4px 0 16px rgba(0,0,0,.15)}
            .page-body{margin-left:0}
            .hero{padding:28px 20px;text-align:center}
            .hero h2{font-size:24px}
            .hero div{flex-direction:column;align-items:center}
            .cards{grid-template-columns:1fr}
          }
          '

          # ── SHARED JS (sidebar search + toggle) ───────────────────
          SHARED_JS='
          <script>
          (function(){
            var sidebar=document.querySelector(".sidebar");
            var toggle=document.querySelector(".sidebar-toggle");
            if(toggle){toggle.addEventListener("click",function(){sidebar.classList.toggle("open")})}

            // Load nav.json for sidebar tree
            var basePath=document.querySelector("meta[name=base-path]");
            var base=basePath?basePath.content:"";
            fetch(base+"nav.json").then(function(r){return r.json()}).then(function(data){
              var tree=document.querySelector(".nav-tree");
              if(!tree)return;
              var currentPage=location.pathname;

              // Program Summary link at the very top
              if(data.length>0 && data[0]._program_summary){
                var pa=document.createElement("a");pa.className="cap-link";pa.href=base+data[0]._program_summary;
                pa.innerHTML="<span class=\"cap-id\" style=\"background:#fef3cd;color:#6e4b00\">📐</span> Program Architecture Summary";
                pa.style.fontWeight="700";pa.style.padding="8px 16px";pa.dataset.search="program summary architecture";
                tree.appendChild(pa);
                var hr=document.createElement("hr");hr.style.cssText="border:0;border-top:1px solid #e4e8ed;margin:6px 12px";
                tree.appendChild(hr);
              }

              data.forEach(function(t){
                if(t._program_summary && !t.tower) return;
                var tg=document.createElement("div");tg.className="tower-group";tg.dataset.tower=t.tower;
                var th=document.createElement("div");th.className="tower-header";
                th.innerHTML="<span class=\"arrow\">▶</span><span class=\"icon\">"+t.icon+"</span><a href=\""+base+"tower-"+t.tower+".html\">"+t.tower+"</a>";
                th.addEventListener("click",function(e){if(e.target.tagName!=="A"){th.classList.toggle("open")}});
                tg.appendChild(th);

                // Single proc-group container for L0 + L1 groups + caps
                var pg=document.createElement("div");pg.className="proc-group";

                // L0 summary link under tower header
                if(t.l0_summary){
                  var l0=document.createElement("a");l0.className="cap-link";l0.href=base+t.l0_summary;
                  l0.innerHTML="<span class=\"cap-id\" style=\"background:#e0e7ff;color:#3730a3\">L0</span> Tower Architecture Summary";
                  l0.style.fontWeight="600";l0.dataset.search=(t.tower+" l0 summary architecture").toLowerCase();
                  pg.appendChild(l0);
                }

                t.groups.forEach(function(g){
                  // Collapsible L1 label
                  var pl=document.createElement("div");pl.className="proc-label";
                  pl.innerHTML="<span class=\"l1-arrow\">▶</span> "+g.group;
                  pl.style.cursor="pointer";
                  pl.addEventListener("click",function(){pl.classList.toggle("open")});
                  pg.appendChild(pl);

                  // L1 child container
                  var lc=document.createElement("div");lc.className="l1-children";

                  if(g.l1_summary){
                    var l1=document.createElement("a");l1.className="cap-link";l1.href=base+g.l1_summary;
                    l1.innerHTML="<span class=\"cap-id\" style=\"background:#dbeafe;color:#1e40af\">L1</span> Process Architecture Summary";
                    l1.style.fontWeight="600";l1.dataset.search=(g.group+" l1 summary architecture").toLowerCase();
                    lc.appendChild(l1);
                  }
                  g.caps.forEach(function(c){
                    var a=document.createElement("a");a.className="cap-link";a.href=base+c.href;
                    a.innerHTML="<span class=\"cap-id\">"+c.id+"</span> "+c.name;
                    a.dataset.search=(c.id+" "+c.name+" "+g.group+" "+t.tower+" "+t.name).toLowerCase();
                    if(currentPage.indexOf(c.id)!==-1){a.classList.add("active");th.classList.add("open");pl.classList.add("open")}
                    lc.appendChild(a);
                  });
                  pg.appendChild(lc);
                });
                tg.appendChild(pg);
                tree.appendChild(tg);
              });

              // Auto-open tower for tower pages
              var m=currentPage.match(/tower-([A-Z0-9-]+)\.html/);
              if(m){var hdr=tree.querySelector("[data-tower=\""+m[1]+"\"] .tower-header");if(hdr)hdr.classList.add("open")}
            }).catch(function(){});

            // Search filter
            var input=document.querySelector(".sidebar .search-box input");
            if(input){
              input.addEventListener("input",function(){
                var q=input.value.trim().toLowerCase();
                var groups=document.querySelectorAll(".tower-group");
                var anyVisible=false;
                groups.forEach(function(tg){
                  var links=tg.querySelectorAll(".cap-link");
                  var towerVisible=false;
                  links.forEach(function(a){
                    var match=!q||a.dataset.search.indexOf(q)!==-1;
                    a.style.display=match?"block":"none";
                    if(match)towerVisible=true;
                  });
                  var labels=tg.querySelectorAll(".proc-label");
                  labels.forEach(function(lbl){
                    if(q){lbl.classList.add("open")}
                    var childBlock=lbl.nextElementSibling;
                    if(childBlock&&childBlock.classList.contains("l1-children")){
                      var caps=childBlock.querySelectorAll(".cap-link");
                      var hasVisible=false;
                      caps.forEach(function(c){if(c.style.display!=="none")hasVisible=true});
                      lbl.style.display=hasVisible?"block":"none";
                      childBlock.style.display=hasVisible?"block":"none";
                    }
                  });
                  tg.style.display=towerVisible?"block":"none";
                  var pg=tg.querySelector(".proc-group");
                  if(q&&towerVisible){pg.classList.add("search-open")}else{pg.classList.remove("search-open")}
                  if(towerVisible)anyVisible=true;
                });
                // Show/hide no-results message
                var nr=document.querySelector(".no-results");
                if(nr){nr.style.display=anyVisible?"none":"block"}
              });
            }
          })();
          </script>
          '

