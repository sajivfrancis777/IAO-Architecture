          @media(max-width:768px){.chat-panel:not(.fullscreen){width:calc(100vw - 16px);height:calc(100vh - 80px);bottom:8px;right:8px;border-radius:12px}.chat-fab{bottom:16px;right:16px;width:48px;height:48px;font-size:20px}}
          """

          TOOLBAR_JS = """
          <script>
          (function(){
            var sb=document.querySelector(".portal-sidebar"),ov=document.querySelector(".portal-sidebar-overlay");
            var sidebarBtn=document.querySelector(".sidebar-btn");
            if(sidebarBtn&&sb&&ov){sidebarBtn.addEventListener("click",function(){sb.classList.toggle("open");ov.classList.toggle("open")});ov.addEventListener("click",function(){sb.classList.remove("open");ov.classList.remove("open")})}
            var pdfBtn=document.querySelector(".portal-toolbar .pdf-btn");
            if(pdfBtn) pdfBtn.addEventListener("click",function(){window.print()});

            // ── Release filter logic ──
            var relSel=document.getElementById("doc-release-filter");
            if(relSel){
              var saved=localStorage.getItem("iao-release-filter");
              var path=location.pathname;
              // Detect current release from URL path: /R3/towers/... => R3
              var pathMatch=path.match(/\/(R[1-5])\/towers\//);
              var currentRel=pathMatch?pathMatch[1]:null;
              // Sync dropdown: prefer URL path, then localStorage
              if(currentRel){relSel.value=currentRel;localStorage.setItem("iao-release-filter",currentRel)}
              else if(saved&&saved!=="All"){relSel.value=saved}
              else{relSel.value="All"}
              // On dropdown change: navigate to selected release path
              relSel.addEventListener("change",function(){
                var r=relSel.value;
                localStorage.setItem("iao-release-filter",r);
                var p=location.pathname;
                if(r&&r!=="All"){
                  // If already on a release path /Rx/towers/..., swap the release
                  if(/\/R[1-5]\/towers\//.test(p)){p=p.replace(/\/R[1-5]\/towers\//,"/"+r+"/towers/")}
                  // If on root /towers/..., insert release prefix
                  else if(/\/towers\//.test(p)){p=p.replace(/\/towers\//,"/"+r+"/towers/")}
                }else{
                  // "All" selected: go back to root /towers/ path
                  p=p.replace(/\/R[1-5]\/towers\//,"/towers/");
                }
                if(p!==location.pathname){location.href=p}
              });
              // Auto-redirect: if localStorage says R3 but we are on /towers/ (no release prefix)
              if(saved&&saved!=="All"&&!currentRel&&/\/towers\//.test(path)){
                var newP=path.replace(/\/towers\//,"/"+saved+"/towers/");
                if(newP!==path){location.href=newP;return}
              }
            }

            var depth=location.pathname.replace(/^\\/[^\\/]*\\//,"").split("/").length;
            var base="";for(var i=1;i<depth;i++)base+="../";
            fetch(base+"nav.json").then(function(r){return r.json()}).then(function(data){
              var tree=document.querySelector(".ps-tree");if(!tree)return;
              var cur=location.pathname;

              // Program Summary link at top of sidebar
              if(data.length>0 && data[0]._program_summary){
                var pa=document.createElement("a");pa.className="ps-cap";pa.href=base+data[0]._program_summary;
                pa.innerHTML="<span class='cid' style='background:#fef3cd;color:#6e4b00'>📐</span>Program Summary";
                pa.style.fontWeight="700";pa.style.padding="6px 12px";pa.dataset.search="program summary architecture";
                tree.appendChild(pa);
                var hr=document.createElement("hr");hr.style.cssText="border:0;border-top:1px solid #e4e8ed;margin:6px 8px";
                tree.appendChild(hr);
              }

              data.forEach(function(t){
                if(t._program_summary && !t.tower) return;
                var tg=document.createElement("div");tg.className="ps-tower";tg.dataset.tower=t.tower;
                var hdr=document.createElement("div");hdr.className="ps-tower-hdr";
                hdr.innerHTML="<span class='arrow'>\\u25B6</span>"+t.icon+" "+t.tower;
                hdr.addEventListener("click",function(){hdr.classList.toggle("open")});tg.appendChild(hdr);

                var procs=document.createElement("div");procs.className="ps-procs";

                // L0 summary link
                if(t.l0_summary){
                  var l0a=document.createElement("a");l0a.className="ps-cap";l0a.href=base+t.l0_summary;
                  l0a.innerHTML="<span class='cid' style='background:#e0e7ff;color:#3730a3'>L0</span>Tower Summary";
                  l0a.style.fontWeight="600";l0a.dataset.search=(t.tower+" l0 summary").toLowerCase();
                  procs.appendChild(l0a);
                }

                t.groups.forEach(function(g){
                  // Collapsible L1 label
                  var lbl=document.createElement("div");lbl.className="ps-proc-lbl";
                  lbl.innerHTML="<span class='l1-arrow'>\\u25B6</span> "+g.group;
                  lbl.style.cursor="pointer";
                  lbl.addEventListener("click",function(){lbl.classList.toggle("open")});
                  procs.appendChild(lbl);

                  // L1 child container
                  var lc=document.createElement("div");lc.className="ps-l1-children";

                  // L1 summary link
                  if(g.l1_summary){
                    var l1a=document.createElement("a");l1a.className="ps-cap";l1a.href=base+g.l1_summary;
                    l1a.innerHTML="<span class='cid' style='background:#dbeafe;color:#1e40af'>L1</span>Process Summary";
                    l1a.style.fontWeight="600";l1a.dataset.search=(g.group+" l1 summary").toLowerCase();
                    lc.appendChild(l1a);
                  }
                  g.caps.forEach(function(c){
                    var a=document.createElement("a");a.className="ps-cap";a.href=base+c.href;
                    a.innerHTML="<span class='cid'>"+c.id+"</span>"+c.name;
                    a.dataset.search=(c.id+" "+c.name+" "+g.group+" "+t.tower+" "+t.name).toLowerCase();
                    if(cur.indexOf(c.id)!==-1){a.classList.add("active");hdr.classList.add("open");lbl.classList.add("open")}
                    lc.appendChild(a);
                  });
                  procs.appendChild(lc);
                });tg.appendChild(procs);tree.appendChild(tg);
              });
            }).catch(function(){});
            var input=document.querySelector(".ps-search input");
            if(input){input.addEventListener("input",function(){
              var q=input.value.trim().toLowerCase();
              document.querySelectorAll(".ps-tower").forEach(function(tg){
                var vis=false;
                tg.querySelectorAll(".ps-cap").forEach(function(a){var ok=!q||a.dataset.search.indexOf(q)!==-1;a.style.display=ok?"block":"none";if(ok)vis=true});
                tg.querySelectorAll(".ps-proc-lbl").forEach(function(lbl){
                  if(q)lbl.classList.add("open");
                  var childBlock=lbl.nextElementSibling;
                  if(childBlock&&childBlock.classList.contains("ps-l1-children")){
                    var caps=childBlock.querySelectorAll(".ps-cap");var has=false;
                    caps.forEach(function(c){if(c.style.display!=="none")has=true});
                    lbl.style.display=has?"block":"none";childBlock.style.display=has?"block":"none";
                  }
                });
                tg.style.display=vis?"block":"none";
                var pg=tg.querySelector(".ps-procs");if(q&&vis)pg.classList.add("search-open");else pg.classList.remove("search-open");
              });
              var em=document.querySelector(".ps-empty");if(em){var any=document.querySelectorAll('.ps-tower:not([style*="none"])').length;em.style.display=any||!q?"none":"block"}
            })}

            // ── Chat widget logic ──
            var chatFab=document.getElementById("chat-fab"),chatPanel=document.getElementById("chat-panel");
            var chatClose=document.getElementById("chat-close"),chatFS=document.getElementById("chat-fullscreen");
            var chatSettings=document.getElementById("chat-settings");
            var chatInput=document.getElementById("chat-input"),chatSend=document.getElementById("chat-send");
            var chatBody=document.getElementById("chat-body");
            var CHAT_OWNER="sajivfrancis777",CHAT_REPO="IAO-Architecture";
            var CHAT_TOKEN_KEY="iao-chat-token";
            var chatHistory=[];

            function getChatToken(){return localStorage.getItem(CHAT_TOKEN_KEY)||""}
            function setChatToken(t){localStorage.setItem(CHAT_TOKEN_KEY,t)}

            function addMsg(role,text){
              var d=document.createElement("div");
              d.className="chat-msg "+(role==="user"?"user":"bot");
              d.textContent=text;
              chatBody.appendChild(d);
              chatBody.scrollTop=chatBody.scrollHeight;
              return d;
            }

            function showTyping(){
              var d=document.createElement("div");d.className="chat-typing";d.id="chat-typing";
              d.textContent="Thinking... (GitHub Actions ~30-60s)";
              chatBody.appendChild(d);chatBody.scrollTop=chatBody.scrollHeight;
              return d;
            }
            function removeTyping(){var t=document.getElementById("chat-typing");if(t)t.remove()}

            function genId(){return "chat-"+Date.now()+"-"+Math.random().toString(36).substring(2,10)}

            // Detect page context for the system prompt
            function getPageContext(){
              var ctx={};
              var p=location.pathname;
              ctx.page_url=location.href;
              // Tower from URL
              var tm=p.match(/tower-([A-Z0-9-]+)\.html/);
              if(tm)ctx.tower=tm[1];
              var tm2=p.match(/towers\/([A-Z0-9-]+)\//);
              if(tm2)ctx.tower=tm2[1];
              // Release from URL
              var rm=p.match(/\/(R[1-5])\//);
              if(rm)ctx.release=rm[1];
              // Cap from URL
              var cm=p.match(/\/([A-Z]+-\d+)/);
              if(cm)ctx.capability=cm[1];
              return ctx;
            }

            async function sendChat(message){
              var token=getChatToken();
              if(!token){showSetup();return}
              chatInput.disabled=true;chatSend.disabled=true;
              addMsg("user",message);
              chatHistory.push({role:"user",content:message});
              var typing=showTyping();
              var reqId=genId();
              // 1. Trigger repository_dispatch
              try{
                var dispRes=await fetch("https://api.github.com/repos/"+CHAT_OWNER+"/"+CHAT_REPO+"/dispatches",{
                  method:"POST",
                  headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},
                  body:JSON.stringify({event_type:"chat-request",client_payload:{request_id:reqId,messages:chatHistory.slice(-10),context:getPageContext(),timestamp:new Date().toISOString()}})
                });
                if(!dispRes.ok&&dispRes.status===204){}
                else if(!dispRes.ok){
                  removeTyping();
                  if(dispRes.status===401||dispRes.status===403){addMsg("bot","Token invalid or lacks permissions. Click ⚙ to update. Need: Contents read + Actions write.")}
                  else{addMsg("bot","Failed to send request ("+dispRes.status+"). Check token permissions.")}
                  chatInput.disabled=false;chatSend.disabled=false;return;
                }
              }catch(e){removeTyping();addMsg("bot","Network error: "+e.message);chatInput.disabled=false;chatSend.disabled=false;return}
              // 2. Poll for response (max 90s)
              var pollUrl="https://api.github.com/repos/"+CHAT_OWNER+"/"+CHAT_REPO+"/contents/data/chat-responses/"+reqId+".json?ref=main";
              var attempts=0,maxAttempts=30;
              var pollTimer=setInterval(async function(){
                attempts++;
                if(attempts>maxAttempts){clearInterval(pollTimer);removeTyping();addMsg("bot","Response timed out. The workflow may still be running — try again in a minute.");chatInput.disabled=false;chatSend.disabled=false;return}
                try{
                  var r=await fetch(pollUrl,{headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github.v3+json"}});
                  if(r.status===200){
                    clearInterval(pollTimer);removeTyping();
                    var fileData=await r.json();
                    var content=atob(fileData.content.replace(/\s/g,""));
                    var resp=JSON.parse(content);
                    if(resp.status==="ok"){
                      addMsg("bot",resp.reply);
                      chatHistory.push({role:"assistant",content:resp.reply});
                    }else{addMsg("bot","Error: "+(resp.error||"Unknown error"))}
                    chatInput.disabled=false;chatSend.disabled=false;
                  }
                }catch(e){}// keep polling
              },3000);
            }

            function showSetup(){
              // Show inline setup in chat body
              var existing=document.getElementById("chat-setup-box");if(existing)existing.remove();
              var box=document.createElement("div");box.id="chat-setup-box";box.className="chat-setup";
              box.innerHTML='<div class="setup-title">⚙ GitHub Token Required</div>'
                +'<div class="setup-desc">Enter a fine-grained PAT with <b>Contents: Read</b> + repository <b>Actions: Write</b> on<br><code>sajivfrancis777/IAO-Architecture</code></div>'
                +'<input type="password" id="chat-token-input" placeholder="github_pat_..." spellcheck="false">'
                +'<button class="setup-btn" id="chat-token-save">Save Token</button>'
                +'<div id="chat-token-status"></div>';
              chatBody.appendChild(box);chatBody.scrollTop=chatBody.scrollHeight;
              document.getElementById("chat-token-save").addEventListener("click",function(){
                var t=document.getElementById("chat-token-input").value.trim();
                if(!t){return}
                setChatToken(t);
                var st=document.getElementById("chat-token-status");
                st.className="chat-setup setup-status setup-ok";st.textContent="Token saved! You can now send messages.";
                setTimeout(function(){box.remove()},1500);
              });
            }

            if(chatFab&&chatPanel){
              // Check token on load
              if(!getChatToken()){
                // Show badge indicating setup needed
                var badge=chatFab.querySelector(".chat-badge");
                if(badge)badge.style.background="#ef4444";
              }else{
                var badge=chatFab.querySelector(".chat-badge");
                if(badge)badge.style.display="none";
              }
              chatFab.addEventListener("click",function(){
                chatPanel.classList.add("open");chatFab.style.display="none";
                if(!getChatToken())showSetup();
              });
              chatClose.addEventListener("click",function(){chatPanel.classList.remove("open");chatPanel.classList.remove("fullscreen");chatFab.style.display="flex"});
              chatFS.addEventListener("click",function(){
                chatPanel.classList.toggle("fullscreen");
                chatFS.innerHTML=chatPanel.classList.contains("fullscreen")?"&#11036;":"&#9974;";
                chatFS.title=chatPanel.classList.contains("fullscreen")?"Exit fullscreen":"Toggle fullscreen";
              });
              if(chatSettings){chatSettings.addEventListener("click",function(){showSetup()})}
              chatSend.addEventListener("click",function(){
                var msg=chatInput.value.trim();if(!msg)return;
                chatInput.value="";sendChat(msg);
              });
              chatInput.addEventListener("keydown",function(e){
                if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();chatSend.click()}
              });
              document.addEventListener("keydown",function(e){
                if(e.key==="Escape"&&chatPanel.classList.contains("open")){
                  if(chatPanel.classList.contains("fullscreen")){chatPanel.classList.remove("fullscreen");chatFS.innerHTML="&#9974;";chatFS.title="Toggle fullscreen"}
                  else{chatPanel.classList.remove("open");chatFab.style.display="flex"}
                }
              });
            }
          })();
          </script>
          """

          # Collect ALL HTML pages that need toolbar+sidebar+chatbot injection:
          # - *.html             (index.html, tower-*.html, 404.html)
          # - cap/**/*.html      (capability landing pages)
          # - towers/**/*.html   (SAD, RICEFW Tracker, Testing Report)
          # - R[0-9]/towers/**   (per-release docs)
          # - dashboard/**       (Program + Tower dashboards)
          # - summaries/**       (Program summaries)
          # - R[0-9]/summaries/** (per-release Program summaries)
          html_files = sorted(
              glob.glob("_site/*.html")
              + glob.glob("_site/cap/**/*.html", recursive=True)
              + glob.glob("_site/towers/**/*.html", recursive=True)
              + glob.glob("_site/R[0-9]/towers/**/*.html", recursive=True)
              + glob.glob("_site/dashboard/**/*.html", recursive=True)
              + glob.glob("_site/summaries/**/*.html", recursive=True)
              + glob.glob("_site/R[0-9]/summaries/**/*.html", recursive=True)
          )

          count = 0
          for html_file in html_files:
              with open(html_file, "r", encoding="utf-8") as f:
                  content = f.read()
              if "portal-toolbar" in content:
                  continue

              # Determine tower from path
              parts = html_file.replace("\\", "/").split("/")
              tower = "Unknown"
              if "towers" in parts:
                  tower_idx = parts.index("towers") + 1
                  tower = parts[tower_idx] if tower_idx < len(parts) else "Unknown"
              elif "dashboard" in parts:
                  dash_idx = parts.index("dashboard") + 1
                  if dash_idx < len(parts) and parts[dash_idx] != "index.html":
                      tower = parts[dash_idx]

              # Compute relative base path to _site root
              rel = html_file.replace("_site/", "", 1)
              depth = rel.count("/")
              base = "../" * depth

              # Determine document type label for the toolbar
              fname = os.path.basename(html_file)
              if "RICEFW" in fname:
                  doc_label = "RICEFW Tracker"
              elif "Testing" in fname:
                  doc_label = "Testing Report"
              elif "Architecture" in fname:
                  doc_label = "Architecture"
              elif "dashboard" in html_file:
                  doc_label = "Dashboard"
              else:
                  doc_label = ""

              # Tower link — only show when tower is known
              tower_link = f'<a href="{base}tower-{tower}.html">{tower} Tower</a>' if tower != "Unknown" else ""

              # Dashboard pages already have their own PDF button (id="btn-pdf")
              # with Plotly chart-freeze logic — skip the generic one to avoid duplicates
              is_dashboard = "dashboard" in html_file
              pdf_btn = '' if is_dashboard else '<button class="pdf-btn" title="Print / Save as PDF">&#128196; Download PDF</button>'

              # Release filter — only on document pages (NOT dashboard — it has its own)
              is_doc_page = "/towers/" in html_file.replace("\\", "/")
              is_dashboard = "dashboard" in html_file
              show_release = is_doc_page and not is_dashboard
              release_filter = '''<select class="tb-release" id="doc-release-filter" title="Filter by Release">
              <option value="All">All Releases</option>
              <option value="R1">R1</option>
              <option value="R2">R2</option>
              <option value="R3">R3</option>
              <option value="R4">R4</option>
              <option value="R5">R5</option>
            </select>''' if show_release else ''

              # Build toolbar HTML
              toolbar_html = f'''
          <div class="portal-toolbar">
            <button class="sidebar-btn" title="Browse capabilities">&#9776;</button>
            <a href="{base}index.html">&#127968; Home</a>
            {tower_link}
            <span class="tb-title">{doc_label}</span>
            {release_filter}
            {pdf_btn}
          </div>
          <div class="portal-sidebar-overlay"></div>
          <nav class="portal-sidebar">
            <div style="padding:12px 16px 0">
              <a href="{base}index.html" style="display:block;padding:8px 14px;background:#f5f8fc;color:#00285a;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;text-align:center;margin-bottom:4px;border:1px solid #e4e8ed">&#127968; Portal Home</a>
              <a href="{base}dashboard/index.html" style="display:block;padding:8px 14px;background:linear-gradient(135deg,#00285a,#0060a9);color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;text-align:center;margin-bottom:8px">&#128202; Program Dashboard</a>
            </div>
            <div class="ps-search"><input type="text" placeholder="Search capabilities..." aria-label="Search"></div>
            <div class="ps-tree"></div>
            <div class="ps-empty">No matching capabilities</div>
          </nav>
          <button class="chat-fab" id="chat-fab" title="IAO Architecture Assistant">
            &#128172;
            <span class="chat-badge"></span>
          </button>
          <div class="chat-panel" id="chat-panel">
            <div class="chat-hdr">
              <span class="chat-title">&#129302; IAO Architecture Assistant</span>
              <span class="chat-subtitle">AI-Powered</span>
              <button id="chat-settings" title="Token settings">&#9881;</button>
              <button id="chat-fullscreen" title="Toggle fullscreen">&#9974;</button>
              <button id="chat-close" title="Close chat">&times;</button>
            </div>
            <div class="chat-body" id="chat-body">
              <div class="chat-msg bot">Welcome! I can answer questions about RICEFW objects, build readiness, architecture patterns, and towers across the IAO IDM 2.0 program. What would you like to know?</div>
            </div>
            <div class="chat-phase-note">Phase 1 · GitHub Actions backend · ~30-60s response time</div>
            <div class="chat-input-bar">
              <input type="text" id="chat-input" placeholder="Ask about architecture, RICEFW, testing...">
              <button class="chat-send" id="chat-send">Send</button>
            </div>
          </div>
          '''

              # Inject CSS before </head> (includes hiding standalone PDF button)
              # Inject favicon + CSS before </head>
              favicon_tag = f'<link rel="icon" type="image/x-icon" href="{base}favicon.ico">'
              content = content.replace("</head>", f"{favicon_tag}\n<style>{TOOLBAR_CSS} .pdf-download-btn{{display:none !important}}</style>\n</head>", 1)
              # Inject toolbar HTML after <body> (handles <body> or <body ...>)
              content = re.sub(r"(<body[^>]*>)", r"\1\n" + toolbar_html, content, count=1)
              # Inject JS before </body>
              content = content.replace("</body>", f"{TOOLBAR_JS}\n</body>", 1)

              # Rewrite absolute site-root links (href="/towers/...", href="/summaries/...")
              # to relative paths using the computed base ("../../" etc.).
              # This is needed because GitHub Pages project sites serve from /REPO-NAME/
              # so bare absolute paths like /towers/... resolve to the wrong root.
              content = re.sub(
                  r'href="/(towers/|summaries/|cap/|dashboard/)',
                  f'href="{base}\\1',
                  content
              )

              with open(html_file, "w", encoding="utf-8") as f:
                  f.write(content)
              count += 1

          print(f"  Injected toolbar + sidebar + chatbot into {count} pages")
          PYINJECT

          # ── CUSTOM DOMAIN (CNAME) ──────────────────────────────────
          # If CUSTOM_DOMAIN is set, create a CNAME file for GitHub Pages
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "$CUSTOM_DOMAIN" > _site/CNAME
            echo "Custom domain configured: $CUSTOM_DOMAIN"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
