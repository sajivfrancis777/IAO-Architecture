# IAO Architecture Pipeline — Scheduled Generation & SharePoint Sync
#
# Triggers:
#   - Daily (07:00 UTC Mon-Fri) — full regeneration after data-refresh
#   - Manual dispatch — ad-hoc runs with optional tower filter
#   - Push to main — regenerate only if src/ or templates/ changed

name: Generate Architecture Docs

on:
  schedule:
    - cron: "0 7 * * 1-5"          # Weekdays at 07:00 UTC (1h after data-refresh)
  workflow_dispatch:
    inputs:
      tower:
        description: "Tower shortcode (blank = all)"
        required: false
        default: ""
      schedule:
        description: "Override schedule: daily, weekly, monthly"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "src/**"
      - "templates/**"
      - "towers/**/input/**"

permissions:
  contents: write                 # commit generated outputs back

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env <<'EOF'
          SMARTSHEET_TOKEN=${{ secrets.SMARTSHEET_TOKEN }}
          IAPM_BEARER_TOKEN=${{ secrets.IAPM_BEARER_TOKEN }}
          BIC_AUTH_TOKEN=${{ secrets.BIC_AUTH_TOKEN }}
          JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
          JIRA_PAT=${{ secrets.JIRA_PAT }}
          JIRA_USER_EMAIL=${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          SP_TENANT_ID=${{ secrets.SP_TENANT_ID }}
          SP_CLIENT_ID=${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET=${{ secrets.SP_CLIENT_SECRET }}
          SP_SITE_URL=${{ secrets.SP_SITE_URL }}
          SP_DOC_LIBRARY=${{ secrets.SP_DOC_LIBRARY }}
          SP_TARGET_FOLDER=${{ secrets.SP_TARGET_FOLDER }}
          EOF
          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Generate Architecture MDs
        run: |
          if [ -n "${{ github.event.inputs.tower }}" ]; then
            python -m src.gen_systems_arch --tower "${{ github.event.inputs.tower }}"
          else
            python -m src.gen_systems_arch --all
          fi

      - name: Fetch JIRA data
        continue-on-error: true
        run: python scripts/fetch_jira_data.py

      - name: Generate Testing Reports
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.tower }}" ]; then
            python scripts/gen_testing_report.py --tower "${{ github.event.inputs.tower }}"
          else
            python scripts/gen_testing_report.py --all
          fi

      - name: Update SADs from Smartsheet
        run: python scripts/update_sad_from_smartsheet.py

      - name: Generate Summary Documents (L0/L1/Program)
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.tower }}" ]; then
            python -m src.gen_summary --tower "${{ github.event.inputs.tower }}" --level L1
            python -m src.gen_summary --tower "${{ github.event.inputs.tower }}" --level L0
          else
            python -m src.gen_summary --all
          fi

      - name: Generate HTML outputs
        run: |
          if [ -n "${{ github.event.inputs.tower }}" ]; then
            python scripts/gen_pdf.py --html-only --tower "${{ github.event.inputs.tower }}"
          else
            python scripts/gen_pdf.py --html-only
          fi

      - name: Commit generated outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate architecture docs [skip ci]"
          file_pattern: "towers/ output/"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Sync to SharePoint
        if: success()
        continue-on-error: true
        run: python scripts/sync_sharepoint.py --all
        env:
          SP_TENANT_ID: ${{ secrets.SP_TENANT_ID }}
          SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
          SP_SITE_URL: ${{ secrets.SP_SITE_URL }}
          SP_DOC_LIBRARY: ${{ secrets.SP_DOC_LIBRARY }}
          SP_TARGET_FOLDER: ${{ secrets.SP_TARGET_FOLDER }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-docs
          path: |
            towers/**/output/**/*.html
            towers/**/output/**/*.pdf
            towers/**/output/**/*.md
          retention-days: 30
